# golangci-lint v2 schema. Bumped from v1.61/v1.64 because both v1 lines
# refuse go.mod's `go 1.25` (built with Go 1.24, exit 3). v2.x ships a
# Go-1.25-compatible toolchain — OctoBoooot delta review on octo-auth#2.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
